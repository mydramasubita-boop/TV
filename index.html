<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <!-- FIX 6: icona app per TV/Firestick -->
    <link rel="icon" type="image/png" href="/icona_app_tv.png" />
    <link rel="apple-touch-icon" href="/icona_app_tv.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="My Drama Life" />
    <meta name="application-name" content="My Drama Life" />
    <meta name="theme-color" content="#FF1493" />
    <title>My Drama Life</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        padding: 0;
        /* FIX 1: sfondo nero dal primo frame, niente flash bianco */
        background: #000 !important;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      /* FIX 1: il root parte già nero */
      #root {
        width: 100%;
        height: 100%;
        background: #000;
      }

      /* FIX 1: nasconde completamente i controlli nativi del browser su tutti i video */
      video::-webkit-media-controls,
      video::-webkit-media-controls-enclosure,
      video::-webkit-media-controls-panel,
      video::-webkit-media-controls-play-button,
      video::-webkit-media-controls-volume-slider,
      video::-webkit-media-controls-mute-button,
      video::-webkit-media-controls-timeline,
      video::-webkit-media-controls-current-time-display {
        display: none !important;
        -webkit-appearance: none;
      }
      video {
        outline: none;
        background: #000;
      }

      /* Forza landscape su mobile */
      @media screen and (orientation: portrait) {
        body {
          transform: rotate(-90deg);
          transform-origin: left top;
          width: 100vh;
          height: 100vw;
          position: absolute;
          top: 100%;
          left: 0;
        }
      }

      /* Nasconde scrollbar ovunque */
      ::-webkit-scrollbar { display: none; }
      * { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
